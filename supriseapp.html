<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>3D Doğum Günü Tebriği - Renkli Versiyon</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; }
        #birthdayMessage {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 30px; background-color: rgba(40, 40, 40, 0.95); border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7); color: #f0f0f0; text-align: center;
            z-index: 10; display: none; max-width: 70%; min-width: 400px;
            border: 2px solid #ffcc00; box-sizing: border-box;
        }
        h2 { color: #ffe082; font-size: 2.5em; margin-bottom: 20px; }
        p { font-size: 1.2em; line-height: 1.7; margin-bottom: 15px; }
        #birthdayMessage button {
            background-color: #ff9800; color: white; padding: 12px 25px; border: none;
            border-radius: 5px; cursor: pointer; font-size: 1.1em; margin-top: 25px;
            transition: background-color 0.3s ease;
        }
        #birthdayMessage button:hover { background-color: #fb8c00; }
    </style>
</head>
<body>
    
    <div id="container"></div>

    <div id="birthdayMessage">
        <h2>Canım [Kişinin Adı],</h2>
        <p>Doğum günün kutlu olsun! Bu 3D sahne, sana olan sevgimin ve mutluluk dileklerimin küçük bir yansıması.</p>
        <p style="margin-top: 20px;">Hayatının her anının, tıpkı bu sahnedeki mum ışığı gibi parlak ve sıcak geçmesini dilerim. Seni çok seviyorum!</p>
        <p style="margin-top: 30px; font-weight: bold;">Sevgilerimle,</p>
        <p>Adın</p>
        <button onclick="document.getElementById('birthdayMessage').style.display = 'none';">Mesajı Kapat</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    
    
    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let letterMesh;
        const candleLights = [];
        let particleSystem;
        const particles = [];
        const candleLightColor = 0xffa500; 

        function init() {
            // 1. Sahne, Kamera, Renderer
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 2.5, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('container').appendChild(renderer.domElement);

            // 2. Işıklar (Daha sıcak tonlar ve yoğunluk)
            const ambientLight = new THREE.AmbientLight(0xffddaa, 0.15); // Sarımsı ortam ışığı
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffddaa, 0.4); // Ana ışık da daha sıcak
            mainLight.position.set(3, 5, 2);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            scene.add(mainLight);

            // 3. Masa (Büyütme ve daha sıcak renk)
            const TABLE_HEIGHT = 0.1;
const TABLE_TOP_Y = TABLE_HEIGHT / 2;
const tableGeometry = new THREE.BoxGeometry(5.5, TABLE_HEIGHT, 3); // Masa daha büyük!
const tableMaterial = new THREE.MeshPhongMaterial({ color: 0x4e342e }); 
const table = new THREE.Mesh(tableGeometry, tableMaterial);
table.position.y = -TABLE_TOP_Y; 
table.receiveShadow = true;
scene.add(table);   
// init fonksiyonu içinde, Masa (3. Bölüm) oluşturulduktan sonra ekleyin:

// 3. Masa (Büyütülmüş) bölümünden hemen sonra...

// Yeni kod bloğu: Masa Ayakları
const legMaterial = new THREE.MeshPhongMaterial({ color: 0x3e2723 }); // Masadan biraz daha koyu renk
const legGeometry = new THREE.BoxGeometry(0.15, 4, 0.15); // İnce, uzun ayaklar

// Ayakların yerleşeceği köşelerin koordinatları:
// Masanın genişliği: 5.5, derinliği: 3. Köşeden 0.2 birim içeride konumlandıralım.
const X_OFFSET = (5.5 / 2) - 0.2; // 2.75 - 0.2 = 2.55
const Z_OFFSET = (3 / 2) - 0.2;   // 1.5 - 0.2 = 1.3

// Ayakların merkezi Y pozisyonu:
// Masa üstü (0.05) - (Ayak Yüksekliği 0.9 / 2) = 0.05 - 0.45 = -0.4
const LEG_Y_POS = TABLE_TOP_Y - (4.2 / 2); 

const positions = [
    { x: X_OFFSET, z: Z_OFFSET },   // Ön Sağ
    { x: -X_OFFSET, z: Z_OFFSET },  // Ön Sol
    { x: X_OFFSET, z: -Z_OFFSET },  // Arka Sağ
    { x: -X_OFFSET, z: -Z_OFFSET }  // Arka Sol
];

positions.forEach(pos => {
    const leg = new THREE.Mesh(legGeometry, legMaterial);
    leg.position.set(pos.x, LEG_Y_POS, pos.z);
    leg.castShadow = true;
    leg.receiveShadow = true;
    scene.add(leg);
});
// Yeni kod bloğu bitti.

            // 4. Pasta (Konumu Masa Üstüne Oturtma)
            // Pastanın tabanı 1.2 birim çapında, yüksekliği 0.4. Pastanın yarısı (0.2) masanın üstüne oturmalı.
            // Pastanın tam ortasının Y koordinatı: TABLE_TOP_Y + (0.4 / 2)
            const CAKE_Y_POS = TABLE_TOP_Y + 0.01
            createCake(0, CAKE_Y_POS, 0); 
            
            // 5. Mektup (Konumu Masa Üstüne Oturtma)
            const LETTER_HEIGHT = 0.01;
            const LETTER_Y_POS = TABLE_TOP_Y + (LETTER_HEIGHT / 10); // Mektubun yarısı masanın üstüne oturmalı

            const envelopeGroup = new THREE.Group(); 
            const envelopeBody = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, LETTER_HEIGHT, 0.4),
                new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 80 })
            );
            envelopeBody.receiveShadow = true;
            envelopeBody.castShadow = true;
            envelopeGroup.add(envelopeBody);

            const sealMaterial = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });
            const seal = new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.02, 16, 32), sealMaterial);
            seal.rotation.x = Math.PI / 2;
            seal.position.z = 0.2;
            seal.position.y = LETTER_HEIGHT / 2;
            envelopeGroup.add(seal);

            // Mektup konumu: Masanın üstünde, pastanın sağında.
            envelopeGroup.position.set(1.5, LETTER_Y_POS, 0.5); 
            envelopeGroup.rotation.y = -Math.PI / 8;
            envelopeGroup.name = 'Mektup';
            letterMesh = envelopeGroup;
            scene.add(letterMesh);

            const letterGlow = new THREE.PointLight(0xffd700, 0.7, 1);
            letterGlow.position.copy(letterMesh.position);
            letterGlow.position.y -= 0.05;
            scene.add(letterGlow);

            // 6. Ortam Dekorasyonu (Duvar Rengi ve Işıklar)
            function init() {
    // ... (1. ve 2. bölümler aynı kalır: Sahne, Kamera, Işıklar)

    // ... (Masa ve objelerin kodları aynı kalır)

    // ----------------------------------------------------
    // --- YENİ KOD: Zemin ve 4 Duvar ---
    // ----------------------------------------------------

    // --- Zemin (Beyaz) ---
    const floorGeometry = new THREE.PlaneGeometry(10, 10);
    const floorMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff }); // BEYAZ ZEMİN
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2; // Yüzeyi yukarı bakar
    floor.position.y = -0.5;
    floor.receiveShadow = true;
    scene.add(floor);

    // --- 4 Duvar (Pembe) ---
    const WALL_DISTANCE = 5; // Duvarların merkezden uzaklığı
    const WALL_HEIGHT = 5;
    
    // Duvar materyali artık PEMBE
    const wallMaterial = new THREE.MeshPhongMaterial({ color: 0xffc0cb }); 
    const wallGeometry = new THREE.PlaneGeometry(10, WALL_HEIGHT); // 10x5 boyutunda duvar

    // 1. ARKA Duvar (Z = -5)
    const backWall = new THREE.Mesh(wallGeometry, wallMaterial);
    backWall.position.set(0, WALL_HEIGHT / 2, -WALL_DISTANCE);
    backWall.receiveShadow = true;
    scene.add(backWall);

    // 2. ÖN Duvar (Z = 5) - Kameranın tam arkasında kalacak, odanın kapalı hissi verir.
    const frontWall = new THREE.Mesh(wallGeometry, wallMaterial);
    frontWall.rotation.y = Math.PI; // Kameraya bakması için 180 derece döndürülür
    frontWall.position.set(0, WALL_HEIGHT / 2, WALL_DISTANCE);
    frontWall.receiveShadow = true;
    scene.add(frontWall);

    // 3. SOL Duvar (X = -5)
    const leftWall = new THREE.Mesh(wallGeometry, wallMaterial);
    leftWall.rotation.y = Math.PI / 2; // Yana doğru 90 derece döndürülür
    leftWall.position.set(-WALL_DISTANCE, WALL_HEIGHT / 2, 0);
    leftWall.receiveShadow = true;
    scene.add(leftWall);

    // 4. SAĞ Duvar (X = 5)
    const rightWall = new THREE.Mesh(wallGeometry, wallMaterial);
    rightWall.rotation.y = -Math.PI / 2; // Yana doğru -90 derece döndürülür
    rightWall.position.set(WALL_DISTANCE, WALL_HEIGHT / 2, 0);
    rightWall.receiveShadow = true;
    scene.add(rightWall);
    
    // Pencere Işığı (Artık Sol Duvarın içinden sızacak)
    const fakeWindowLight = new THREE.PointLight(0xffddaa, 0.5, 10); 
    fakeWindowLight.position.set(-WALL_DISTANCE + 0.5, 2.5, 0.5); // Duvarın hemen içine yerleştirildi
    scene.add(fakeWindowLight);

                
            }

            // 7. Kamera ve Kontroller
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, 0.5, 0);
            controls.update();

            // 8. Raycasting Hazırlık
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('click', onLetterClick, false);
            window.addEventListener('resize', onWindowResize, false);
        }
        
        // ---------- Pasta Oluşturma Fonksiyonu ----------
        function createCake(x, y, z) {
            const cakeGroup = new THREE.Group();
            const frostingMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 100 });
            const cakeMaterial = new THREE.MeshPhongMaterial({ color: 0xf06292, shininess: 80 }); // Canlı pembe

            // Katmanlar
            const bases = [1.2, 0.9, 0.6];
            let currentY = y - 0.2; // İlk katmanın alt yüzeyi y'de başlasın (y = katmanın ortası)
            bases.forEach((radius, index) => {
                const base = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, 0.4, 64), cakeMaterial);
                base.position.y = currentY + 0.2; // Katmanın merkezini ayarla
                base.castShadow = base.receiveShadow = true;
                cakeGroup.add(base);
                
                // Krema (üst katman hariç)
                if (index < bases.length - 1) {
                    const frosting = new THREE.Mesh(new THREE.TorusGeometry(radius + 0.02, 0.04, 8, 50), frostingMaterial);
                    frosting.rotation.x = Math.PI / 2;
                    frosting.position.y = currentY + 0.4;
                    cakeGroup.add(frosting);
                }
                currentY += 0.4;
            });
            
            // Sprinkles (Daha renkli)
            const sprinkleColors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00];
            for(let i = 0; i < 100; i++) {
                const color = sprinkleColors[Math.floor(Math.random() * sprinkleColors.length)];
                const sprinkleMaterial = new THREE.MeshPhongMaterial({ color: color });
                const sprinkle = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.05, 8), sprinkleMaterial);
                const radius = Math.random() * 0.9;
                const angle = Math.random() * Math.PI * 2;
                
                // Üst katmanın üstüne serpelim
                const sprinkleY = y + 0.6; 
                sprinkle.position.set(Math.cos(angle) * radius, sprinkleY + Math.random() * 0.1 - 0.05, Math.sin(angle) * radius);
                sprinkle.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                cakeGroup.add(sprinkle);
            }

            // Mumlar (3 adet)
            const candleMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
            const candleFlameMaterial = new THREE.MeshStandardMaterial({ color: 0xffa500, emissive: 0xffa500, emissiveIntensity: 2 });
            const candlePositions = [{ x: -0.2, z: 0 }, { x: 0.2, z: 0 }, { x: 0, z: -0.2 }];
            const candleY = currentY + 0.15; // En üst katmanın üstüne

            candlePositions.forEach(pos => {
                const candle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.3, 16), candleMaterial);
                candle.position.set(pos.x, candleY, pos.z);
                candle.castShadow = candle.receiveShadow = true;
                cakeGroup.add(candle);

                const flame = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 8), candleFlameMaterial);
                flame.position.copy(candle.position);
                flame.position.y += 0.15 + 0.02;
                cakeGroup.add(flame);

                const pointLight = new THREE.PointLight(candleLightColor, 1.5, 1.5, 2); // Daha yoğun ışık
                pointLight.position.copy(flame.position);
                candleLights.push(pointLight);
                scene.add(pointLight);

                createParticleEmitter(flame.position);
            });

            cakeGroup.position.set(x, y, z); // Pasta grubunun tamamını konumlandır
            scene.add(cakeGroup);
        }

        // ---------- Parçacık Sistemi (Alev için) ----------
        function createParticleEmitter(position) {
            const particleGeometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];

            for (let i = 0; i < 50; i++) {
                // Başlangıç konumları mum pozisyonuna göre
                positions.push(position.x + (Math.random() - 0.5) * 0.05, position.y + (Math.random() * 0.1), position.z + (Math.random() - 0.5) * 0.05);
                colors.push(1, Math.random() * 0.5, 0); // Sarı-Turuncu

                particles.push({
                    velocity: new THREE.Vector3((Math.random() - 0.5) * 0.005, 0.005 + Math.random() * 0.005, (Math.random() - 0.5) * 0.005),
                    life: Math.random() * 50 + 50,
                    maxLife: Math.random() * 50 + 50,
                    initialPosition: position.clone() // Mum alevinin başlangıç pozisyonu
                });
            }

            particleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const particleMaterial = new THREE.PointsMaterial({
                size: 0.03, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false
            });

            particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onLetterClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            for (let i = 0; i < intersects.length; i++) {
                if (intersects[i].object.parent && intersects[i].object.parent.name === 'Mektup') {
                    const clickedLetterGroup = intersects[i].object.parent;

                    document.getElementById('birthdayMessage').style.display = 'block';

                    // Mektup animasyonu
                    gsap.to(clickedLetterGroup.rotation, { duration: 1, y: clickedLetterGroup.rotation.y + Math.PI * 2, ease: "power2.out" });
                    gsap.to(clickedLetterGroup.position, { duration: 0.5, y: clickedLetterGroup.position.y + 0.2, yoyo: true, repeat: 1, ease: "power1.out" });

                    // Mesaj kutusu animasyonu
                    const msgBox = document.getElementById('birthdayMessage');
                    gsap.fromTo(msgBox, 
                        { opacity: 0, scale: 0.8, display: 'block' }, 
                        { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.7)" }
                    );

                    // Mum ışıklarını söndürme animasyonu
                    candleLights.forEach(light => { gsap.to(light, { intensity: 0, duration: 1.5 }); });
                    if (particleSystem) { gsap.to(particleSystem.material, { opacity: 0, duration: 1.5, onUpdate: () => { particleSystem.material.needsUpdate = true; } }); }
                    
                    break;
                }
            }
        }
        
        // ---------- Animasyon Döngüsü ----------
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Parçacık sistemini güncelle
            if (particleSystem && particleSystem.material.opacity > 0) {
                const positions = particleSystem.geometry.attributes.position.array;
                
                // 3 mumun parçacıklarını güncellediğimiz için burası biraz karmaşık
                // Basitlik için tüm parçacıklar aynı anda hareket etmeye devam etsin.
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    p.life -= 1;

                    if (p.life <= 0) {
                        // Parçacığı başlangıç konumunda yeniden başlat (mumun pozisyonu)
                        positions[i * 3 + 0] = p.initialPosition.x + (Math.random() - 0.5) * 0.05; 
                        positions[i * 3 + 1] = p.initialPosition.y + (Math.random() * 0.1);
                        positions[i * 3 + 2] = p.initialPosition.z + (Math.random() - 0.5) * 0.05;
                        p.velocity.set((Math.random() - 0.5) * 0.005, 0.005 + Math.random() * 0.005, (Math.random() - 0.5) * 0.005);
                        p.life = p.maxLife;
                    }

                    positions[i * 3 + 0] += p.velocity.x;
                    positions[i * 3 + 1] += p.velocity.y;
                    positions[i * 3 + 2] += p.velocity.z;
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
